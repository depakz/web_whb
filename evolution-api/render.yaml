services:
  - type: web
    name: evolution-api
    runtime: docker
    plan: free
    # Evolution API default port
    envVars:
      - key: AUTHENTICATION_API_KEY
        sync: false # You will be prompted for this in the Render Dashboard
      - key: DATABASE_ENABLED
        value: "true"
      - key: DATABASE_CONNECTION_URI
        fromDatabase:
          name: evolution-db
          property: connectionString
      - key: CACHE_REDIS_ENABLED
        value: "true"
      - key: CACHE_REDIS_URI
        # Using the internal service name as the host
        value: redis://evolution-redis:6379

  # Redis defined as a service type for compatibility
  - type: redis
    name: evolution-redis
    plan: free
    ipAllowList: [] # Allows internal traffic only

databases:
  - name: evolution-db
    plan: free