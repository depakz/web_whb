services:
  - type: web
    name: evolution-api
    runtime: docker # This repo is best run as a Docker container
    plan: free
    envVars:
      - key: AUTHENTICATION_API_KEY
        value: your_secret_key_123 # Change this!
      - key: DATABASE_ENABLED
        value: "true"
      - key: DATABASE_CONNECTION_URI
        fromDatabase:
          name: evolution-db
          property: connectionString
      - key: CACHE_REDIS_ENABLED
        value: "true"
      - key: CACHE_REDIS_URI
        fromKeyValue:
          name: evolution-redis
          property: connectionString

databases:
  - name: evolution-db
    plan: free

keyvalues:
  - name: evolution-redis
    plan: free